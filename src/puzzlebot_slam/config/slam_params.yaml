slam_node:
  ros__parameters:
    # Grid dimensions
    resolution:   0.05          # m/cell  (5 cm)
    map_width:    400            # cells   (20 m)
    map_height:   400            # cells   (20 m)

    # Log-odds thresholds tuned for Gazebo simulation (no ICP, clean odometry).
    # Higher l_occ → walls appear after fewer hits.
    # Lower |l_free| → walls are not erased by rays from other angles.
    l_occ:        0.70           # increment per LiDAR hit (walls appear after ~2 hits)
    l_free:      -0.12           # decrement per free ray cell (gentle erasure)
    l_min:       -2.0            # clamp minimum
    l_max:        4.0            # clamp maximum (walls persist longer)

    # ICP scan matcher — disabled for simulation (Gazebo odometry is accurate;
    # ICP in symmetric rooms converges to wrong local minima and causes pose jumps)
    use_icp:          false
    icp_max_iter:     30
    icp_tolerance:    0.0001
    icp_reject_dist:  0.5
    icp_min_points:   20
    icp_max_fitness:  0.2

    # Map frame initial heading (radians).  Rotates the entire map frame at
    # startup so walls appear horizontal/vertical without the robot needing
    # to start facing a specific direction.  This corrects the large constant
    # tilt you see after driving around.
    # Measure: in RViz, estimate how many degrees CCW the whole map is tilted
    # relative to the room.  Set map_initial_heading to that angle in radians.
    # Quick conversions: 30° = 0.524  |  45° = 0.785  |  -45° = -0.785
    map_initial_heading: 0.0

    # Fine-trim on the TF-resolved laser mounting yaw (radians).
    # Use this to remove a constant map rotation without editing the URDF.
    # Measure the wall tilt in RViz (positive = CCW in map view).
    # If walls tilt clockwise by 5°: laser_yaw_trim: -0.0873
    # If walls tilt CCW by 5°:       laser_yaw_trim:  0.0873
    laser_yaw_trim: 0.0

    # Scan filtering
    range_min:   0.12
    range_max:   10.0

    # Publish /map every N scans (lower = more CPU)
    map_publish_every: 5

    # Ray subsampling: process every Nth ray (1 = all rays, 3 = 3x speedup)
    ray_step: 3

    # Minimum movement before updating the occupancy grid.  Suppresses
    # spurious jitter updates while the robot is stationary.
    min_delta_xy:    0.05   # metres (was 0.02 — real odometry jitter is ~1-3 cm)
    min_delta_theta: 0.05   # radians (~3 deg; was 0.01 — suppresses heading noise)

    # Display thresholds for to_ros_data() — higher evidence required to
    # classify a cell as occupied/free in the published map.  With
    # l_occ=0.50 and l_free=-0.20, display_l_occ=1.5 requires ~3 net hits
    # and display_l_free=-0.8 requires ~4 net free observations.
    display_l_occ:   1.0    # needs ~2 hits to show as occupied (was 1.5 = 3 hits)
    display_l_free: -0.6    # needs ~5 rays to show as free
