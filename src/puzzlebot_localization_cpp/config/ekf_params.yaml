# ─── CALIBRATION (do this once on the real robot) ────────────────────────────
# Both wheel_radius and wheel_separation below are nominal datasheet values.
# Closed-loop drift on a test square almost always traces back to these being
# 1–3 % off.  To calibrate:
#
#   1. wheel_radius (r):
#      Drive 1.00 m straight at low speed (teleop, fixed time).
#      r_true = r_nominal * (commanded_distance / measured_distance)
#
#   2. wheel_separation (L):
#      Spin in place exactly N=10 full rotations (use a floor mark).
#      L_true = L_nominal * (measured_total_yaw / (N * 2π))
#      i.e. if it under-rotated, L is too large; if it over-rotated, L is too small.
#
# Update the values here AND in puzzlebot_controller/config/puzzlebot_controllers.yaml.
# ─────────────────────────────────────────────────────────────────────────────

kinematic_simulator:
  ros__parameters:
    wheel_radius:     0.05          # r [m]   — TODO: calibrate
    wheel_separation: 0.19          # L [m]   — TODO: calibrate

ekf_localization:
  ros__parameters:
    wheel_radius:     0.05          # r [m]   — TODO: calibrate
    wheel_separation: 0.19          # L [m]   — TODO: calibrate
    update_rate:      20.0          # Hz  (dt = 0.05 s)

    # Process noise — wheel-odometry trust per dt.
    # Lowered so the EKF leans on ICP corrections instead of dead-reckoning
    # drift (uncalibrated r/L will silently rotate the map otherwise).
    q_x:     0.003
    q_y:     0.003
    q_theta: 0.002

    # Measurement noise — published cov of /pose_measurement is what actually
    # gates ICP weight; these are fallbacks for other sources.
    r_x:     0.02
    r_y:     0.02
    r_theta: 0.01

icp_node:
  ros__parameters:
    # Scan filtering
    range_min:  0.12          # m — ignore returns closer than this
    range_max:  10.0          # m — ignore returns farther than this

    # ICP algorithm — loosened so corrections actually fire on real LiDAR data.
    icp_max_iter:    25       # maximum iterations per scan
    icp_tolerance:   0.0001   # convergence threshold (m and rad)
    icp_reject_dist: 0.4      # m — drop point pairs farther than this
    icp_min_points:  20       # minimum inliers; skip scan if fewer
    icp_max_fitness: 0.25     # m — reject correction if mean error exceeds this

    # Keyframe update thresholds — smaller so corrections happen mid-rotation
    # (was 0.3 m / 11° → too coarse for the 60 cm test square).
    keyframe_dist:   0.2      # m
    keyframe_angle:  0.15     # rad (~8.6°)

    # Covariance published with each /pose_measurement.
    # Smaller → EKF trusts ICP more relative to wheel odometry.
    cov_xy:    0.01           # m²
    cov_theta: 0.005          # rad²
